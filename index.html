<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>삼장사 자소서 Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel">
      <header class="chat-header">
        <div>
          <p class="eyebrow">취업 준비를 돕는 AI 도우미</p>
          <h1>삼장사 자소서 Assistant</h1>
        </div>
        <div class="font-controls">
          <span class="font-label">크기조절</span>
          <button class="font-btn" id="fontDown" aria-label="글자 작게">A−</button>
          <button class="font-btn" id="fontReset" aria-label="글자 기본 크기">A</button>
          <button class="font-btn" id="fontUp" aria-label="글자 크게">A+</button>
        </div>
      </header>
      <section class="guide-panel">
        <div class="guide-header">
          <div>
            <p class="guide-label">🧭 가이드</p>
            <h2>문항별 도움 받기</h2>
          </div>
          <span class="guide-tip">클릭하면 바로 예시를 볼 수 있어요</span>
        </div>
        <div class="guide-cards">
          <button class="guide-card" data-question="지원동기">
            <span class="guide-card-title">💼 지원동기</span>
            <span class="guide-card-desc">왜 이 회사에 관심을 두게 되었는지 쉽게 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="성장과정">
            <span class="guide-card-title">🌱 성장과정</span>
            <span class="guide-card-desc">어떤 경험이 나를 어떻게 성장하게 만들었는지 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="강점">
            <span class="guide-card-title">⭐ 강점</span>
            <span class="guide-card-desc">내 장점과 실제 사례를 자연스럽게 연결해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="협업 경험">
            <span class="guide-card-title">🤝 협업 경험</span>
            <span class="guide-card-desc">다른 사람과 함께 일한 경험을 책임감 있게 표현해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="입사 후 포부">
            <span class="guide-card-title">🎯 입사 후 포부</span>
            <span class="guide-card-desc">회사에서 어떤 역할을 하고 싶은지 구체적으로 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="도전 경험">
            <span class="guide-card-title">🔥 도전 경험</span>
            <span class="guide-card-desc">어려운 상황을 극복한 과정을 설득력 있게 다듬어 드립니다.</span>
          </button>
          <button class="guide-card" data-question="실패 경험">
            <span class="guide-card-title">📘 실패 경험</span>
            <span class="guide-card-desc">실패를 배움으로 바꾸는 표현을 자연스럽게 도와 드립니다.</span>
          </button>
          <button class="guide-card" data-question="직무 적합성">
            <span class="guide-card-title">🧩 직무 적합성</span>
            <span class="guide-card-desc">내 역량이 직무와 어떻게 연결되는지 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="문제 해결 능력">
            <span class="guide-card-title">🛠️ 문제 해결 능력</span>
            <span class="guide-card-desc">문제를 파악하고 해결한 경험을 체계적으로 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="리더십 경험">
            <span class="guide-card-title">👥 리더십 경험</span>
            <span class="guide-card-desc">주도적으로 이끌었던 경험을 책임감 있게 표현해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="학습 능력">
            <span class="guide-card-title">📚 학습 능력</span>
            <span class="guide-card-desc">새로운 것을 배워 익히고 적용한 경험을 정리해 드립니다.</span>
          </button>
          <button class="guide-card" data-question="가치관">
            <span class="guide-card-title">💡 가치관</span>
            <span class="guide-card-desc">내가 중요하게 생각하는 기준과 태도를 자연스럽게 표현해 드립니다.</span>
          </button>
        </div>
      </section>
      <section class="chat-window" id="chatWindow">
        <div class="message bot">안녕하세요! 😊 취업 준비를 돕기 위해 자기소개서 문항을 쉽게 설명해 드릴게요. 문항을 선택하거나, 궁금한 말을 자유롭게 적어 주세요.</div>
      </section>
      <form class="chat-input-area" id="chatForm">
        <input id="userInput" type="text" placeholder="예: 지원동기와 입사 후 포부를 쉽게 써줘" autocomplete="off" />
        <button type="submit">전송</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
